services:
  - type: web
    name: math-portal-api
    runtime: node
    rootDir: server
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install
    startCommand: node index.js
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: math-portal-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: math-portal-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: math-portal-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: math-portal-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: math-portal-db
          property: database
      - key: PARENT_TOKEN
        value: parent123   # Change this to something only you know

databases:
  - name: math-portal-db
    databaseName: math_portal
    user: math_portal
